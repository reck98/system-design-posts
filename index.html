<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Design Reading Tracker</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020c2b;
    color:#e2e8f0;
    font-family:Inter,Arial,sans-serif;
    min-height:100vh;
}

.container{
    max-width:900px;
    margin:auto;
    padding:32px 20px;
}

h1{
    font-size:3rem;
    font-weight:700;
    margin-bottom:10px;
}

.subtitle{
    color:#94a3b8;
    font-size:1.1rem;
    margin-bottom:24px;
}

.stats{
    margin-bottom:24px;
    color:#94a3b8;
    font-size:1rem;
}

.progress-bar{
    width:100%;
    height:10px;
    background:#1e293b;
    border-radius:999px;
    overflow:hidden;
    margin-top:12px;
}

.progress-fill{
    height:100%;
    width:0%;
    background:#22c55e;
    transition:width .3s ease;
}

.post{
    display:flex;
    align-items:center;
    gap:16px;

    background:#0f172a;
    border:1px solid #1e293b;

    padding:16px;
    border-radius:12px;

    margin-bottom:10px;

    transition:.2s;
}

.post:hover{
    border-color:#475569;
}

.post.completed{
    opacity:.55;
}

.post.completed .title{
    text-decoration:line-through;
}

.checkbox{
    width:20px;
    height:20px;
    cursor:pointer;
}

.date{
    min-width:120px;
    color:#94a3b8;
    font-size:.9rem;
}

.title{
    flex:1;
    font-weight:500;
}

.loading{
    color:#94a3b8;
}

footer{
    margin-top:50px;
    padding-top:20px;
    border-top:1px solid #334155;

    text-align:center;
    color:#94a3b8;
    font-size:.9rem;
    line-height:1.6;
}

@media(max-width:600px){

    h1{
        font-size:2.4rem;
    }

    .post{
        gap:12px;
    }

    .date{
        min-width:90px;
        font-size:.8rem;
    }

    .title{
        font-size:.9rem;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>System Design Reading Tracker</h1>

    <p class="subtitle">
        Track your progress through Aditya Tandon Sir's System Design posts.
    </p>

    <div class="stats">

        <div id="progressText">
            0 / 0 completed
        </div>

        <div class="progress-bar">
            <div
                id="progressFill"
                class="progress-fill">
            </div>
        </div>

    </div>

    <div id="posts">

        <p class="loading">
            Loading posts...
        </p>

    </div>

    <footer>
        <p>
            Content credit:
            <strong>Aditya Tandon Sir</strong>.
            These posts are compiled here purely for educational and personal learning purposes.
        </p>
    </footer>

</div>

<script>

const STORAGE_KEY = "system_design_completed";

function getCompleted(){

    return JSON.parse(
        localStorage.getItem(STORAGE_KEY) || "{}"
    );

}

function saveCompleted(data){

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(data)
    );

}

function updateProgress(total){

    const completed = getCompleted();

    const count =
        Object.values(completed)
              .filter(Boolean)
              .length;

    document.getElementById("progressText")
        .innerText =
        `${count} / ${total} completed`;

    const percentage =
        total === 0
        ? 0
        : (count / total) * 100;

    document.getElementById("progressFill")
        .style.width =
        percentage + "%";
}

function render(posts){

    const container =
        document.getElementById("posts");

    container.innerHTML = "";

    const completed =
        getCompleted();

    posts.forEach((post,index)=>{

        const row =
            document.createElement("div");

        row.className = "post";

        const checked =
            completed[index] || false;

        if(checked)
            row.classList.add("completed");

        row.innerHTML = `
            <input
                class="checkbox"
                type="checkbox"
                ${checked ? "checked" : ""}
            >

            <div class="date">
                ${post.date}
            </div>

            <div class="title">
                ${post.title}
            </div>
        `;

        const checkbox =
            row.querySelector("input");

        checkbox.addEventListener(
            "change",
            ()=>{

                const state =
                    getCompleted();

                state[index] =
                    checkbox.checked;

                saveCompleted(state);

                row.classList.toggle(
                    "completed",
                    checkbox.checked
                );

                updateProgress(posts.length);
            }
        );

        container.appendChild(row);
    });

    updateProgress(posts.length);
}

async function loadPosts(){

    try{

        const response =
            await fetch(
                "./system_design_posts.json"
            );

        const posts =
            await response.json();

        render(posts);

    }
    catch(error){

        document.getElementById("posts")
            .innerHTML =
            `
            <p style="color:red">
                Failed to load posts.
            </p>
            `;

        console.error(error);
    }
}

loadPosts();

</script>

</body>
</html>
